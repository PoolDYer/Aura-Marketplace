services:
  - type: web
    name: aura-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: CACHE_PREFIX
        value: aura
      - key: MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_CURRENCY
        value: PEN
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: NEON_AUTH_BASE_URL
        value: https://ep-red-darkness-acsr0yn8.neonauth.sa-east-1.aws.neon.tech/neondb/auth
      - key: NEON_AUTH_JWKS_URL
        value: https://ep-red-darkness-acsr0yn8.neonauth.sa-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: Aura
