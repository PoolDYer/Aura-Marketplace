name: Frontend CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - frontend/**
      - vercel.json
      - frontend/vercel.json
      - .github/workflows/frontend-ci-cd.yml
  push:
    branches:
      - main
    paths:
      - frontend/**
      - vercel.json
      - frontend/vercel.json
      - .github/workflows/frontend-ci-cd.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  validate:
    name: Validate frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:3000' }}
          VITE_MERCADOPAGO_PUBLIC_KEY: ${{ vars.VITE_MERCADOPAGO_PUBLIC_KEY || 'test-public-key' }}
          VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL || 'https://example.com/auth' }}
        run: npm run build

